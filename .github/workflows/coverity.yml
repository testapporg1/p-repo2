name: CI-BlackDuck-SCA-Basic

on:
  push:
    branches: [main, master, develop, stage, release]
  pull_request:
    branches: [main, master, develop, stage, release]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Black Duck SCA Scan
        id: black-duck-sca-scan
        uses: blackduck-inc/black-duck-security-scan@SIGINT-4611
        with:
          ### SCANNING: Required fields
          blackducksca_url: ${{ vars.BLACKDUCKSCA_URL }}
          blackducksca_token: ${{ secrets.BLACKDUCKSCA_TOKEN }}

          ### SCAN FAILURE SEVERITIES
          blackducksca_scan_failure_severities: 'BLOCKER,CRITICAL'

          ### SARIF report generation
          blackducksca_reports_sarif_create: true

          ### FIX PULL REQUEST CREATION
          blackducksca_fixpr_enabled: true
          blackducksca_fixpr_maxCount: 2
          blackducksca_fixpr_filter_severities: 'CRITICAL,HIGH'

          ### PR COMMENTS
          blackducksca_prcomment_enabled: true

          # Required for Fix PR, PR Comments, and SARIF upload features
          github_token: ${{ secrets.GITHUB_TOKEN }}
